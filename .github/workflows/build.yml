name: Build Windows EXE

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pyinstaller

      - name: Build EXE
        run: pyinstaller --onefile --windowed --name "SALITA_IDE" main.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: SALITA_IDE-windows
          path: dist/SALITA_IDE.exe
